random_seed: 42

formulation_feasibility:
  policy_version: round2_candidate_feasibility_v1
  start_round: 2
  max_active_polymers: 1
  max_total_polymer_pct: 10.0
  max_total_serum_protein_pct: 10.0
  max_total_polymer_serum_pct: 15.0
  max_sugar_M_with_polymer: 0.50
  max_nonpermeating_M_with_polymer: 0.75
  ingredient_caps:
    pvp_pct: 10.0
    dextran_pct: 5.0
    hyaluronic_acid_pct: 1.0
  polymer_features:
    - pvp_pct
    - dextran_pct
    - hyaluronic_acid_pct
    - methylcellulose_pct
  serum_protein_features:
    - fbs_pct
    - hsa_pct
    - human_serum_pct
  sugar_features:
    - trehalose_M
    - sucrose_M
    - glucose_M
    - raffinose_M
  nonpermeating_osmolyte_features:
    - ectoin_M
    - trehalose_M
    - sucrose_M
    - raffinose_M
    - taurine_M
    - myo_inositol_M
    - methoxyphenyl_beta_d_glucopyranoside_M
    - betaine_M
    - proline_M
    - glucose_M
    - creatine_M
    - acetamide_M

candidate_generation:
  local_fraction: 0.40
  sparse_fraction: 0.35
  boundary_fraction: 0.25
  local_relative_std: 0.20
  local_max_active_ingredients: 6
  sparse_max_active_ingredients: 2
  boundary_max_active_ingredients: 4
  max_attempt_multiplier: 100
  rescue_min_viability_percent: 50.0
  rescue_scale_factors:
    - 0.25
    - 0.50
    - 0.75
  rescue_candidates_per_round: 2

support_policy:
  radius_percentile: 95.0
  radius_multiplier: 1.25
  uncertainty_cap_percentile: 90.0
  max_boundary_candidates_per_slate: 1
  out_of_support_score_penalty: 0.20
  competitive_utility_band: 0.15
  diversity_weight: 0.05

preparation_model:
  min_labels: 8
  probability_threshold: 0.50

continuous_qlognehvi:
  enabled: true
  generated_candidate_target: 24
  max_sparse_mask_size: 4
  max_masks: 16

phase_mode: auto

phase_transition:
  mechanics_enable_min_paired_observations: 8
  mechanics_enable_min_distinct_formulations: 6
  mechanics_enable_min_batches: 2

round_policy:
  viability_screens_per_round: 12
  mechanical_tests_per_round: 4
  mechanical_min_tests_per_round: 3
  allow_one_novelty_exception: true
  intact_probability_threshold: 0.50
  mechanics_startup_observation_threshold: 8

penalties:
  active_ingredient_soft_limit: 8
  active_ingredient_excess_weight: 0.05
  single_molar_ingredient_limit_M: 0.5
  single_molar_excess_weight: 0.20
  intact_failure_weight: 0.80

transfer:
  literature_viability_noise_percent: 50.0
  legacy_wetlab_viability_noise_percent: 5.0
  legacy_mechanical_transfer: false

feedback:
  new_viability_noise_percent: 1.0

selection:
  generated_candidate_pool_size: 2000
  viability_ucb_kappa: 0.35
  mechanical_ucb_kappa: 0.50
  diversity_weight: 0.10
  novelty_exception_probability_floor: 0.25
  # Max number of selected candidates in a round that may share the exact
  # same *pair* (2-ingredient) active-ingredient set. Prevents the slate
  # from being dominated by repeats of one high-viability-scoring pair
  # (e.g. ectoin + ethylene_glycol) once origin-bucket diversity alone isn't
  # enough, since every origin bucket can independently re-discover the
  # same favored pair. See _enforce_ingredient_combination_cap.
  max_candidates_per_ingredient_combination: 2
  # Max number of selected candidates in a round that may share the exact
  # same *3-or-more-ingredient* active-ingredient set (trio, four-a-kind,
  # etc.). An exact match across 3+ ingredients simultaneously is a much
  # stronger redundancy signal than a repeated pair, so this is much
  # tighter by default: at most 1 candidate per round per exact larger
  # combination.
  max_candidates_per_larger_ingredient_combination: 1
  reference_point:
    viability_percent: 0.0
    critical_axial_load_N_per_needle: 0.0

# NOTE: screening_phase_score is now purely viability-based (see
# helper/selection.py annotate_candidates). viability_weight/intact_weight
# below are unused by the screening path and kept only as a record of the
# pre-fix weighting; the intact gate now only acts via rescue-candidate
# generation (candidate_generation.rescue_*) and mechanics-phase scoring
# (penalties.intact_failure_weight, round_policy.intact_probability_threshold).
screening_phase:
  viability_weight: 0.75
  intact_weight: 0.25

retest:
  enabled: true
  max_candidates_per_round: 2
  formulation_disagreement_threshold_percent: 15.0
  local_residual_threshold_percent: 20.0
  uncertainty_percent_threshold: 12.0
  nearest_neighbor_count: 3
